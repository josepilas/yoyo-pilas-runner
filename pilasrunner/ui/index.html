<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YoYo Pilas Runner</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell" aria-label="YoYo Pilas Runner">
      <header class="topbar">
        <img class="brand-logo" src="../assets/logo.webp" alt="YoYo Pilas Runner">
        <div class="system-strip" aria-label="System status">
          <span id="clock">10:31</span>
          <span>Wi-Fi</span>
          <span>92%</span>
        </div>
      </header>

      <section class="viewport">
        <aside class="library" aria-label="Game library">
          <div class="library-head">
            <span>Games</span>
            <span id="gameCount">0 games</span>
          </div>

          <div class="game-list" id="gameList" aria-live="polite"></div>
        </aside>

        <section class="details" aria-label="Selected game details">
          <div class="cover-stage">
            <div class="cover-art" id="coverArt"></div>
          </div>

          <div class="meta">
            <p class="eyebrow" id="gameKind">APK</p>
            <h1 id="gameTitle">AM2R</h1>
            <div class="status-line">
              <span id="runtime">gmloader-next.armhf</span>
              <span id="profile">default profile</span>
            </div>
          </div>

          <div class="stats" aria-label="Compatibility details">
            <div>
              <span>Arch</span>
              <strong id="arch">armhf</strong>
            </div>
            <div>
              <span>Save</span>
              <strong id="save">ready</strong>
            </div>
            <div>
              <span>Controls</span>
              <strong id="controls">mapped</strong>
            </div>
          </div>

          <div class="action-row">
            <button class="primary-action" id="launchButton" type="button">A / B / Start&nbsp;&nbsp;Launch</button>
          </div>

          <div class="activity" aria-label="Launcher activity">
            <div class="activity-head">
              <span id="activityTitle">Ready</span>
              <span id="activityState">idle</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <p id="activityText">D-Pad moves. Select exits. Select + Start closes gameplay.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
