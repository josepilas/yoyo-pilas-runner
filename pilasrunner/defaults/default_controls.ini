# Default YoYo Pilas Runner controls.
# This file is parsed by the launcher and copied into each game's generated cache.
# Supported keys are listed in README.md.

[buttons]
dpad_up=UP
dpad_down=DOWN
dpad_left=LEFT
dpad_right=RIGHT
a=Z
b=X
x=C
y=V
l1=Q
r1=E
l2=SHIFT
r2=CTRL
start=ENTER
select=ESC
left_stick_click=TAB
right_stick_click=SPACE
