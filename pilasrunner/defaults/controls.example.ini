# Example per-game controls.ini file.
# Put this next to a folder-format game as:
#   pilasrunner/games/GameName/controls.ini
# For a loose APK, use:
#   pilasrunner/games/GameName.controls.ini
# or:
#   pilasrunner/games/GameName/controls.ini

[buttons]
dpad_up=W
dpad_down=S
dpad_left=A
dpad_right=D
a=Z
b=X
x=C
y=V
l1=Q
r1=E
l2=SHIFT
r2=CTRL
start=ENTER
select=ESC
left_stick_click=TAB
right_stick_click=SPACE
